<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Margin Scheme VAT Calc</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Margin Calc">

    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; justify-content: center; }
        .box { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 360px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-top: 0; font-size: 1.3rem; color: #1c1c1e; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 11px; color: #8e8e93; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px; }
        .input-wrapper { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #8e8e93; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 18px; box-sizing: border-box; background: #f2f2f7; font-weight: bold; }
        input:focus { outline: none; border-color: #34c759; background: white; }
        .line { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; }
        .total { font-weight: bold; font-size: 19px; border-top: 1px solid #e5e5ea; padding-top: 12px; margin-top: 12px; margin-bottom: 5px; }
        .margin-pct { font-size: 14px; text-align: right; margin-bottom: 12px; }
        .vat-box { background: #f2f2f7; border: 1px dashed #8e8e93; border-radius: 8px; padding: 12px; margin-top: 15px; margin-bottom: 15px; font-size: 14px; }
        .green { color: #34c759; font-weight: bold; }
        .red { color: #ff3b30; font-weight: bold; }
        .grey { color: #8e8e93; font-weight: 500; font-size: 14px; }
        .dark-grey { color: #48484a; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>AutoTrader VAT Calc</h2>
    <div class="subtitle">Margin Scheme (Non-VAT Q)</div>
    
    <div class="input-wrapper">
        <label>TOTAL PURCHASE PRICE (INC. AUCTION FEES)</label>
        <input type="number" id="buyPrice" placeholder="e.g. 15000" inputmode="decimal" oninput="runCalc()">
    </div>

    <div class="input-wrapper">
        <label>AUTOTRADER TARGET PRICE (INC. VAT)</label>
        <input type="number" id="sellPrice" placeholder="e.g. 18500" inputmode="decimal" oninput="runCalc()">
    </div>
    
    <div style="margin-top: 25px;">
        <div class="line">
            <span>Gross Stand-In Profit:</span>
            <span id="resGrossProfit" style="color:#007aff; font-weight:bold;">£0.00</span>
        </div>
        
        <div class="vat-box">
            <div class="line" style="margin-bottom: 0;">
                <span>HMRC Margin VAT (1/6th):</span>
                <span id="resMarginVat" class="dark-grey">£0.00</span>
            </div>
        </div>

        <div class="line total">
            <span>True Net Profit Margin:</span>
            <span id="resNetProfit">£0.00</span>
        </div>
        <div class="margin-pct grey">
            Margin Percentage: <span id="resProfitPct" style="font-weight: bold;">0.00%</span>
        </div>
    </div>
</div>

<script>
function runCalc() {
    var buyGross = parseFloat(document.getElementById('buyPrice').value) || 0;
    var sellGross = parseFloat(document.getElementById('sellPrice').value) || 0;
    
    // Calculate raw gross difference
    var grossProfit = sellGross - buyGross;
    
    var marginVat = 0;
    var netProfit = 0;
    
    // Margin scheme rules: Only pay VAT if there's a profit. No loss relief.
    if (grossProfit > 0) {
        marginVat = grossProfit / 6;
        netProfit = grossProfit - marginVat;
    } else {
        marginVat = 0;
        netProfit = grossProfit; // Shows full loss amount if negative
    }
    
    // Percentage calculated as True Net Profit divided by Gross Sales price
    var profitPct = sellGross > 0 ? (netProfit / sellGross) * 100 : 0;
    
    // Update interface elements
    document.getElementById('resGrossProfit').innerText = '£' + grossProfit.toFixed(2);
    document.getElementById('resMarginVat').innerText = '£' + marginVat.toFixed(2);
    document.getElementById('resNetProfit').innerText = '£' + netProfit.toFixed(2);
    document.getElementById('resProfitPct').innerText = profitPct.toFixed(2) + '%';
    
    var profEl = document.getElementById('resNetProfit');
    var pctEl = document.getElementById('resProfitPct');
    
    if (netProfit > 0) {
        profEl.className = 'green';
        pctEl.className = 'green';
    } else if (netProfit < 0) {
        profEl.className = 'red';
        pctEl.className = 'red';
    } else {
        profEl.className = '';
        pctEl.className = '';
    }
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
